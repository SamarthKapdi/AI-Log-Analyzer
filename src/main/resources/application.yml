server:
  port: 8080

spring:
  application:
    name: ai-log-analyzer
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@//localhost:1521/XEPDB1}
    username: ${DB_USERNAME:system}
    password: ${DB_PASSWORD} # Required — set via environment variable, no default
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: update # For demo purposes, creates/updates schema automatically
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true

# OCI Configuration
oci:
  config:
    profile: ${OCI_CONFIG_PROFILE:DEFAULT} # Profile in ~/.oci/config
    file-path: ${OCI_CONFIG_FILE:~/.oci/config} # Path to OCI config file
  ai:
    compartment-id: ${OCI_COMPARTMENT_ID:} # REQUIRED if not in mock mode: Pass via environment variable
    mock-mode: ${OCI_MOCK_MODE:false} # Set to true to run locally without OCI credentials

# Spring Boot Actuator — expose health and info only
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

# CORS — restrict allowed origins via environment variable for security
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

logging:
  level:
    com.samarth.ai: DEBUG
    org.springframework: INFO
